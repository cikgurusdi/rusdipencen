<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey To Retirement</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header>

    <img src="assets/logo.png" class="logo">

    <h1>Journey To Retirement</h1>

    <p>Sebuah perjalanan yang penuh makna</p>

</header>

<section class="hero">

    <img src="assets/rusdi.jpg" id="profileImage">

    <h2 id="name"></h2>

    <p id="position"></p>

    <p id="school"></p>

</section>

<section class="countdown">

<h2>Menuju Hari Persaraan</h2>

<div class="timer">

<div>
<span id="days">0</span>
<p>Hari</p>
</div>

<div>
<span id="hours">0</span>
<p>Jam</p>
</div>

<div>
<span id="minutes">0</span>
<p>Minit</p>
</div>

<div>
<span id="seconds">0</span>
<p>Saat</p>
</div>

</div>

</section>

<section class="quote">

<h2>Kata-kata Inspirasi</h2>

<p id="quote"></p>

</section>

<section class="timeline">

<h2>Timeline Kerjaya</h2>

<div id="timeline"></div>

</section>

<footer>

<p>© 2026 Journey To Retirement</p>

</footer>

<script src="script.js"></script>

</body>
</html>
